name: quasar-local-server

services:
  local-server:
    build:
      context: ../..
      dockerfile: platform/local-server/Dockerfile
    image: quasar-local-server:latest
    restart: unless-stopped
    stop_grace_period: 30s
    stop_signal: SIGTERM
    env_file:
      - ./.env
    ports:
      # For Mac mini Tailscale access, set QUASAR_PUBLISH_HOST to the Mac mini's
      # Tailscale IP if Docker Desktop can bind it; otherwise use 0.0.0.0 and
      # rely on Tailscale ACLs / macOS firewall. Prefer IP over MagicDNS.
      - "${QUASAR_PUBLISH_HOST:-0.0.0.0}:${QUASAR_LOCAL_PORT:-6180}:6180"
    volumes:
      - quasar-data:/data/quasar
    environment:
      NODE_ENV: production
      QUASAR_HOME: /data/quasar
      QUASAR_LOCAL_HOME: /data/quasar
      QUASAR_LOCAL_SQLITE: /data/quasar/quasar.sqlite
      QUASAR_SEARCH_DATA_DIR: /data/quasar/search.lance
      QUASAR_LOCAL_HOST: 0.0.0.0
      QUASAR_LOCAL_PORT: 6180
      QUASAR_INGEST_TOKEN: ${QUASAR_INGEST_TOKEN:?set QUASAR_INGEST_TOKEN in platform/local-server/.env for remote ingest writes}
      QUASAR_WORKERS_ENABLED: ${QUASAR_WORKERS_ENABLED:-false}
      QUASAR_EMBEDDING_WORKER_ENABLED: ${QUASAR_EMBEDDING_WORKER_ENABLED:-}
      QUASAR_INDEX_REPAIR_WORKER_ENABLED: ${QUASAR_INDEX_REPAIR_WORKER_ENABLED:-}
      QUASAR_FRESHNESS_WORKER_ENABLED: ${QUASAR_FRESHNESS_WORKER_ENABLED:-}
      QUASAR_MAINTENANCE_WORKER_ENABLED: ${QUASAR_MAINTENANCE_WORKER_ENABLED:-}
      QUASAR_WORKER_INTERVAL_MS: ${QUASAR_WORKER_INTERVAL_MS:-5000}
      QUASAR_WORKER_BUSY_INTERVAL_MS: ${QUASAR_WORKER_BUSY_INTERVAL_MS:-100}
      QUASAR_WORKER_LEASE_MS: ${QUASAR_WORKER_LEASE_MS:-600000}
      QUASAR_EMBEDDING_WORKER_LIMIT: ${QUASAR_EMBEDDING_WORKER_LIMIT:-1000}
      QUASAR_EMBEDDING_JOB_MAX_ATTEMPTS: ${QUASAR_EMBEDDING_JOB_MAX_ATTEMPTS:-12}
      QUASAR_EMBEDDING_API_BATCH_SIZE: ${QUASAR_EMBEDDING_API_BATCH_SIZE:-100}
      QUASAR_EMBEDDING_API_CONCURRENCY: ${QUASAR_EMBEDDING_API_CONCURRENCY:-4}
      QUASAR_EMBEDDING_RETRY_BASE_MS: ${QUASAR_EMBEDDING_RETRY_BASE_MS:-30000}
      QUASAR_EMBEDDING_RETRY_MAX_MS: ${QUASAR_EMBEDDING_RETRY_MAX_MS:-600000}
      QUASAR_INDEX_WORKER_LIMIT: ${QUASAR_INDEX_WORKER_LIMIT:-100}
      QUASAR_FRESHNESS_LIMIT: ${QUASAR_FRESHNESS_LIMIT:-500}
      QUASAR_MAINTENANCE_VECTOR: ${QUASAR_MAINTENANCE_VECTOR:-true}
      QUASAR_MAINTENANCE_OPTIMIZE: ${QUASAR_MAINTENANCE_OPTIMIZE:-true}
      QUASAR_EMBEDDING_PROVIDER: ${QUASAR_EMBEDDING_PROVIDER:-synthetic}
      QUASAR_EMBEDDING_MODEL: ${QUASAR_EMBEDDING_MODEL:-hf:nomic-ai/nomic-embed-text-v1.5}
      QUASAR_EMBEDDING_DIMENSIONS: ${QUASAR_EMBEDDING_DIMENSIONS:-768}
      QUASAR_EMBEDDING_TASK: ${QUASAR_EMBEDDING_TASK:-search_document}
      QUASAR_EMBEDDING_DOCUMENT_PREFIX: "${QUASAR_EMBEDDING_DOCUMENT_PREFIX:-search_document: }"
      QUASAR_EMBEDDING_QUERY_PREFIX: "${QUASAR_EMBEDDING_QUERY_PREFIX:-search_query: }"
      QUASAR_EMBEDDING_CACHE_NAMESPACE: ${QUASAR_EMBEDDING_CACHE_NAMESPACE:-}
      SYNTHETIC_API_KEY: ${SYNTHETIC_API_KEY:-}
      SYNTHETIC_OPENAI_BASE_URL: ${SYNTHETIC_OPENAI_BASE_URL:-https://api.synthetic.new/openai/v1}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6180/health"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6

volumes:
  quasar-data:
