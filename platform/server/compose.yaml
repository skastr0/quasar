name: quasar-server

services:
  server:
    build:
      context: ../..
      dockerfile: platform/server/Dockerfile
    image: quasar-server:latest
    restart: unless-stopped
    stop_grace_period: 30s
    stop_signal: SIGTERM
    env_file:
      - ./.env
    ports:
      # Canonical quasar API is published on QUASAR_PUBLISH_PORT (host) -> 6180
      # (container). 7180 is dedicated to quasar; 6180 on this host belongs to an
      # unrelated dev server. QUASAR_PUBLISH_HOST=0.0.0.0 binds loopback + the
      # Tailscale interface, so the canonical URL is http://<tailnet-ip>:7180.
      - "${QUASAR_PUBLISH_HOST:-0.0.0.0}:${QUASAR_PUBLISH_PORT:-7180}:6180"
    volumes:
      - quasar-data:/data/quasar
    environment:
      NODE_ENV: production
      QUASAR_HOME: /data/quasar
      QUASAR_LOCAL_HOME: /data/quasar
      QUASAR_LOCAL_SQLITE: /data/quasar/quasar.sqlite
      QUASAR_LOCAL_HOST: 0.0.0.0
      QUASAR_LOCAL_PORT: 6180
      QUASAR_SEARCH_PROFILE: ${QUASAR_SEARCH_PROFILE:-0}
      QUASAR_INGEST_TOKEN: ${QUASAR_INGEST_TOKEN:?set QUASAR_INGEST_TOKEN in platform/server/.env for remote ingest writes}
      # Pinned: an embedding provider flip is an explicit receipted cutover, never a deploy side-effect.
      QUASAR_EMBEDDING_PROVIDER: synthetic
      # Defaults to the path the Dockerfile bakes the fp32 query model into
      # (/app/.model-cache, in the image's own writable layer). Do NOT default
      # this under /data/quasar: that path is the quasar-data VOLUME, and an
      # empty/fresh named volume mounted there would shadow the baked model,
      # forcing a runtime download on every new volume. Override only to
      # point at a different pre-populated cache.
      QUASAR_EMBEDDING_MODEL_CACHE_DIR: ${QUASAR_EMBEDDING_MODEL_CACHE_DIR:-/app/.model-cache}
      QUASAR_EMBEDDING_ONNX_DTYPE: ${QUASAR_EMBEDDING_ONNX_DTYPE:-q8}
      QUASAR_EMBEDDING_API_BATCH_SIZE: ${QUASAR_EMBEDDING_API_BATCH_SIZE:-100}
      QUASAR_EMBEDDING_API_CONCURRENCY: ${QUASAR_EMBEDDING_API_CONCURRENCY:-4}
      QUASAR_EMBEDDING_RETRY_BASE_MS: ${QUASAR_EMBEDDING_RETRY_BASE_MS:-30000}
      QUASAR_EMBEDDING_RETRY_MAX_MS: ${QUASAR_EMBEDDING_RETRY_MAX_MS:-600000}
      QUASAR_EMBEDDING_MODEL: ${QUASAR_EMBEDDING_MODEL:-hf:nomic-ai/nomic-embed-text-v1.5}
      QUASAR_EMBEDDING_DIMENSIONS: ${QUASAR_EMBEDDING_DIMENSIONS:-768}
      QUASAR_EMBEDDING_TASK: ${QUASAR_EMBEDDING_TASK:-search_document}
      QUASAR_EMBEDDING_DOCUMENT_PREFIX: "${QUASAR_EMBEDDING_DOCUMENT_PREFIX:-search_document: }"
      QUASAR_EMBEDDING_QUERY_PREFIX: "${QUASAR_EMBEDDING_QUERY_PREFIX:-search_query: }"
      QUASAR_EMBEDDING_CACHE_NAMESPACE: ${QUASAR_EMBEDDING_CACHE_NAMESPACE:-}
      SYNTHETIC_API_KEY: ${SYNTHETIC_API_KEY:-}
      SYNTHETIC_OPENAI_BASE_URL: ${SYNTHETIC_OPENAI_BASE_URL:-https://api.synthetic.new/openai/v1}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6180/health"]
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 6

volumes:
  quasar-data:
