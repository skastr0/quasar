name: Proposal
description: Suggest a focused Quasar change
title: "[Proposal]: "
labels: ["proposal"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: scope
    attributes:
      label: Scope and maintenance cost
      description: What code, docs, adapters, or compatibility promises would this touch?
